<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Komdis - INSEKTA 11</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            success: '#10b981',
            danger: '#ef4444',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .fade-in { opacity: 0; transform: translateY(10px); transition: all 0.3s ease-out; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen">
  <!-- Login Modal -->
  <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 fade-in">
    <div class="bg-gray-800 rounded-xl p-6 w-full max-w-md mx-4 shadow-xl">
      <h2 class="text-xl font-bold mb-4 text-center">Akses Komdis</h2>
      <p class="text-gray-400 text-center mb-6">Masukkan password untuk melanjutkan</p>
      <input
        id="passwordInput"
        type="password"
        placeholder="Password"
        class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-primary"
      />
      <div id="loginError" class="text-danger text-sm mt-2 hidden text-center">Password salah!</div>
      <button
        id="loginBtn"
        class="w-full mt-4 py-2 bg-primary hover:bg-indigo-700 rounded-lg font-medium transition"
      >
        Masuk
      </button>
    </div>
  </div>

  <!-- Dashboard Content (hidden until login) -->
  <div id="dashboardContent" class="hidden">
    <header class="p-4 border-b border-gray-700">
      <h1 class="text-2xl font-bold">📊 Dashboard Rekap Pelanggaran</h1>
    </header>

    <main class="p-4">
      <!-- Export & Filter -->
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <button
          id="exportBtn"
          class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg flex items-center gap-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
          Export CSV
        </button>

        <div class="flex gap-2">
          <button id="filterAll" class="px-3 py-1 bg-gray-700 rounded-lg">Semua Hari</button>
          <button id="filterHari1" class="px-3 py-1 bg-gray-700 rounded-lg">Hari 1</button>
          <button id="filterHari2" class="px-3 py-1 bg-gray-700 rounded-lg">Hari 2</button>
          <button id="filterHari3" class="px-3 py-1 bg-gray-700 rounded-lg">Hari 3</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
        <div class="bg-gray-800 p-4 rounded-lg">
          <p class="text-gray-400 text-sm">Total Siswa Melanggar</p>
          <p id="totalStudents" class="text-2xl font-bold">0</p>
        </div>
        <div class="bg-gray-800 p-4 rounded-lg">
          <p class="text-gray-400 text-sm">Total Kejadian</p>
          <p id="totalIncidents" class="text-2xl font-bold">0</p>
        </div>
      </div>

      <!-- Cards Container -->
      <div id="cardsContainer" class="space-y-4">
        <div class="text-center py-12 text-gray-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          <p>Belum ada pelanggaran tercatat.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 hidden fade-in">
    <div class="bg-gray-800 rounded-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
      <div class="p-5 border-b border-gray-700 flex justify-between items-center">
        <h3 id="modalTitle" class="font-bold text-lg">Detail Pelanggaran — Nama Siswa</h3>
        <button id="closeDetailBtn" class="text-gray-400 hover:text-white">&times;</button>
      </div>
      <div id="timelineContainer" class="p-5 space-y-4">
        <!-- Timeline items will be injected here -->
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { db } from './firebase-config.js';

    // DOM Elements
    const loginModal = document.getElementById('loginModal');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const dashboardContent = document.getElementById('dashboardContent');
    const cardsContainer = document.getElementById('cardsContainer');
    const totalStudentsEl = document.getElementById('totalStudents');
    const totalIncidentsEl = document.getElementById('totalIncidents');
    const exportBtn = document.getElementById('exportBtn');
    const detailModal = document.getElementById('detailModal');
    const modalTitle = document.getElementById('modalTitle');
    const timelineContainer = document.getElementById('timelineContainer');
    const closeDetailBtn = document.getElementById('closeDetailBtn');

    // Filter buttons
    const filterAll = document.getElementById('filterAll');
    const filterHari1 = document.getElementById('filterHari1');
    const filterHari2 = document.getElementById('filterHari2');
    const filterHari3 = document.getElementById('filterHari3');

    let currentFilter = 'all'; // 'all', 'hari1', 'hari2', 'hari3'

    // === LOGIN LOGIC ===
    loginBtn.addEventListener('click', () => {
      const pwd = passwordInput.value.trim();
      if (pwd === 'admin123') {
        loginModal.classList.remove('visible');
        setTimeout(() => {
          loginModal.classList.add('hidden');
          dashboardContent.classList.remove('hidden');
          loadDashboardData();
        }, 300);
      } else {
        loginError.classList.remove('hidden');
        passwordInput.focus();
        setTimeout(() => loginError.classList.add('hidden'), 2000);
      }
    });

    // Enter key support
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });

    // === DASHBOARD LOGIC ===
    async function loadDashboardData() {
      try {
        console.log('[Dashboard] Memulai fetch data...');
        const querySnapshot = await db.collection('rekap_pelanggaran').get();
        const docs = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        console.log(`[Dashboard] Ditemukan ${docs.length} dokumen`);

        // Hitung stats
        const totalStudents = docs.filter(d => d.total_pelanggaran > 0).length;
        const totalIncidents = docs.reduce((sum, d) => sum + (d.total_pelanggaran || 0), 0);
        totalStudentsEl.textContent = totalStudents;
        totalIncidentsEl.textContent = totalIncidents;

        // Render cards
        renderCards(docs);
      } catch (err) {
        console.error('[Dashboard] Error fetching data:', err);
        cardsContainer.innerHTML = `
          <div class="bg-red-900/30 border border-red-700 p-4 rounded-lg text-center">
            <p class="text-red-300">Gagal memuat data: ${err.message}</p>
            <button id="retryBtn" class="mt-2 px-3 py-1 bg-red-700 rounded text-sm">Coba Lagi</button>
          </div>
        `;
        document.getElementById('retryBtn').addEventListener('click', loadDashboardData);
      }
    }

    function renderCards(docs) {
      const filtered = docs.filter(doc => {
        if (currentFilter === 'all') return true;
        const hariFilter = currentFilter.replace('hari', '');
        return Object.values(doc.riwayat || {}).some(
          kejadian => kejadian.hari === `Hari ${hariFilter}`
        );
      });

      if (filtered.length === 0) {
        cardsContainer.innerHTML = `
          <div class="text-center py-12 text-gray-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <p>${currentFilter === 'all' ? 'Belum ada pelanggaran tercatat.' : `Tidak ada pelanggaran pada ${currentFilter.toUpperCase()}.`}</p>
          </div>
        `;
        return;
      }

      cardsContainer.innerHTML = filtered.map(doc => `
        <div class="bg-gray-800 rounded-xl p-4 shadow-lg hover:bg-gray-750 transition cursor-pointer border border-gray-700"
             data-id="${doc.id}">
          <div class="flex justify-between items-start">
            <div>
              <h4 class="font-bold">${doc.nama_lengkap}</h4>
              <p class="text-gray-400 text-sm">${doc.kelompok} • No. ${doc.nomor_absen}</p>
            </div>
            <span class="bg-primary px-2 py-1 rounded text-xs">
              ${doc.total_pelanggaran} pelanggaran
            </span>
          </div>
        </div>
      `).join('');

      // Add click handlers to cards
      document.querySelectorAll('#cardsContainer > div').forEach(card => {
        card.addEventListener('click', () => {
          const docId = card.dataset.id;
          const doc = docs.find(d => d.id === docId);
          showDetailModal(doc);
        });
      });
    }

    function showDetailModal(doc) {
      modalTitle.textContent = `Detail Pelanggaran — ${doc.nama_lengkap}`;
      timelineContainer.innerHTML = '';

      const riwayat = doc.riwayat || {};
      const sortedIds = Object.keys(riwayat).sort((a, b) => {
        const dateA = new Date(riwayat[a].waktu_input);
        const dateB = new Date(riwayat[b].waktu_input);
        return dateB - dateA;
      });

      if (sortedIds.length === 0) {
        timelineContainer.innerHTML = '<p class="text-gray-500 italic">Tidak ada riwayat pelanggaran.</p>';
        detailModal.classList.remove('hidden');
        detailModal.classList.add('visible');
        return;
      }

      sortedIds.forEach(id => {
        const kejadian = riwayat[id];
        const date = new Date(kejadian.waktu_input).toLocaleString('id-ID', {
          dateStyle: 'short',
          timeStyle: 'short'
        });

        const item = document.createElement('div');
        item.className = 'border-l-4 border-primary pl-4 py-2';
        item.innerHTML = `
          <div class="flex justify-between">
            <span class="font-medium">${kejadian.hari}</span>
            <span class="text-gray-400 text-sm">${date}</span>
          </div>
          <div class="mt-1">
            <div class="flex flex-wrap gap-2 mb-1">
              ${kejadian.kategori.map(k => `<span class="bg-gray-700 px-2 py-1 rounded text-xs">${k}</span>`).join('')}
            </div>
            <p class="text-gray-300 text-sm italic">"${kejadian.komentar}"</p>
            <p class="text-gray-500 text-xs mt-1">Fasilitator: ${kejadian.fasilitator}</p>
          </div>
        `;
        timelineContainer.appendChild(item);
      });

      detailModal.classList.remove('hidden');
      detailModal.classList.add('visible');
    }

    // Close modal
    closeDetailBtn.addEventListener('click', () => {
      detailModal.classList.remove('visible');
      setTimeout(() => detailModal.classList.add('hidden'), 300);
    });

    // Filter handlers
    filterAll.addEventListener('click', () => setFilter('all'));
    filterHari1.addEventListener('click', () => setFilter('hari1'));
    filterHari2.addEventListener('click', () => setFilter('hari2'));
    filterHari3.addEventListener('click', () => setFilter('hari3'));

    function setFilter(filter) {
      currentFilter = filter;
      // Highlight active
      [filterAll, filterHari1, filterHari2, filterHari3].forEach(btn => btn.classList.remove('bg-primary'));
      switch (filter) {
        case 'all': filterAll.classList.add('bg-primary'); break;
        case 'hari1': filterHari1.classList.add('bg-primary'); break;
        case 'hari2': filterHari2.classList.add('bg-primary'); break;
        case 'hari3': filterHari3.classList.add('bg-primary'); break;
      }
      // Re-render
      const docs = Array.from(document.querySelectorAll('#cardsContainer > div')).map(el => {
        const id = el.dataset.id;
        // In real app, we'd refetch or cache — here we assume global `allDocs`
        // For simplicity, we’ll re-fetch on filter change (not ideal but safe for demo)
      });
      // ⚠️ Untuk produksi: simpan `allDocs` di closure atau state
      loadDashboardData(); // simple reload — acceptable for <200 docs
    }

    // Export CSV
    exportBtn.addEventListener('click', async () => {
      try {
        const snapshot = await db.collection('rekap_pelanggaran').get();
        const rows = [];
        rows.push([
          'Nomor Absen', 'Nama Lengkap', 'Kelompok', 'Total Pelanggaran',
          'Pelanggaran Hari 1', 'Pelanggaran Hari 2', 'Pelanggaran Hari 3'
        ]);

        snapshot.forEach(doc => {
          const d = doc.data();
          const hari1 = Object.values(d.riwayat || {}).filter(k => k.hari === 'Hari 1').length;
          const hari2 = Object.values(d.riwayat || {}).filter(k => k.hari === 'Hari 2').length;
          const hari3 = Object.values(d.riwayat || {}).filter(k => k.hari === 'Hari 3').length;
          rows.push([
            d.nomor_absen,
            d.nama_lengkap,
            d.kelompok,
            d.total_pelanggaran || 0,
            hari1,
            hari2,
            hari3
          ]);
        });

        const csvContent = rows.map(e => e.map(v => `"${v}"`).join(',')).join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `rekap_pelanggaran_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        alert('Export berhasil! File telah diunduh.');
      } catch (err) {
        console.error('Export gagal:', err);
        alert('Gagal export: ' + err.message);
      }
    });

    // Initial show login
    setTimeout(() => loginModal.classList.add('visible'), 100);
  </script>
</body>
</html>
