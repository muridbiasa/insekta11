<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Komdis - INSEKTA 11</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom CSS untuk Modal & State */
        .hidden { display: none !important; }
        
        /* Modal Overlay Setup */
        #modal-detail {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        #modal-detail.active {
            display: flex;
        }

        /* Scrollbar Custom untuk Timeline */
        #detail-timeline::-webkit-scrollbar { width: 6px; }
        #detail-timeline::-webkit-scrollbar-track { background: #1f2937; }
        #detail-timeline::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans antialiased">

    <!-- ========================================================= -->
    <!-- 1. GATEKEEPER (LOGIN SCREEN)                              -->
    <!-- ========================================================= -->
    <div id="gatekeeper" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-full mb-4 shadow-lg shadow-blue-500/20">
                    <span class="text-3xl">🔒</span>
                </div>
                <h1 class="text-2xl font-bold text-white">Akses Komdis</h1>
                <p class="text-gray-400 text-sm mt-2">Masukkan password untuk membuka dashboard</p>
            </div>
            
            <div class="space-y-4">
                <input type="password" id="input-password" 
                    class="w-full p-3 bg-gray-900 border border-gray-600 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white placeholder-gray-500 transition" 
                    placeholder="Password">
                
                <p id="error-msg" class="text-red-500 text-sm text-center hidden animate-pulse">⚠️ Password salah!</p>
                
                <button id="btn-login" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-blue-500/20 transition transform active:scale-95">
                    Masuk Dashboard
                </button>
            </div>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- 2. DASHBOARD CONTAINER (MAIN APP)                         -->
    <!-- ========================================================= -->
    <div id="dashboard-container" class="hidden container mx-auto px-4 py-8 max-w-7xl">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <span>📊</span> Dashboard Rekap Pelanggaran
                </h1>
                <p class="text-gray-400 text-sm mt-1">Monitoring kedisiplinan siswa MPLS INSEKTA 11</p>
            </div>
            <button id="btn-export" 
                class="bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-6 rounded-lg shadow-lg transition flex items-center gap-2 transform active:scale-95">
                <span>📥</span> Export CSV
            </button>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-sm uppercase tracking-wider font-semibold">Total Siswa Melanggar</p>
                <p id="stat-siswa" class="text-4xl font-bold text-white mt-2">0</p>
            </div>
            <div class="bg-gradient-to-br from-gray-800 to-gray-900 p-6 rounded-xl border border-gray-700 shadow-lg">
                <p class="text-gray-400 text-sm uppercase tracking-wider font-semibold">Total Kejadian</p>
                <p id="stat-kejadian" class="text-4xl font-bold text-white mt-2">0</p>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="flex flex-wrap gap-3 mb-8 bg-gray-800 p-4 rounded-xl border border-gray-700 shadow-inner">
            <span class="text-gray-400 font-semibold self-center mr-2 hidden md:block">Filter:</span>
            <button class="filter-btn bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold transition shadow-md" data-filter="Semua">Semua Hari</button>
            <button class="filter-btn bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg font-semibold transition" data-filter="Hari 1">Hari 1</button>
            <button class="filter-btn bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg font-semibold transition" data-filter="Hari 2">Hari 2</button>
            <button class="filter-btn bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg font-semibold transition" data-filter="Hari 3">Hari 3</button>
        </div>

        <!-- Grid Cards Area -->
        <div id="grid-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Default Empty State (akan ditimpa JS) -->
            <div class="col-span-full text-center py-20">
                <div class="inline-block p-4 bg-gray-800 rounded-full mb-4">
                    <span class="text-4xl grayscale opacity-50">📂</span>
                </div>
                <p class="text-gray-500 text-lg">Memuat data...</p>
            </div>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- 3. MODAL DETAIL (OVERLAY)                                 -->
    <!-- ========================================================= -->
    <div id="modal-detail">
        <div class="bg-gray-800 w-full max-w-2xl rounded-2xl shadow-2xl border border-gray-700 max-h-[90vh] flex flex-col overflow-hidden transform transition-all scale-100">
            
            <!-- Modal Header -->
            <div class="flex justify-between items-center p-6 border-b border-gray-700 bg-gray-800 sticky top-0 z-10">
                <h2 id="detail-nama" class="text-xl font-bold text-white truncate pr-4">Detail Pelanggaran</h2>
                <button id="btn-tutup-detail" class="text-gray-400 hover:text-white hover:bg-gray-700 w-8 h-8 flex items-center justify-center rounded-full transition text-2xl leading-none">&times;</button>
            </div>
            
            <!-- Modal Body (Timeline) -->
            <div id="detail-timeline" class="p-6 overflow-y-auto space-y-4 bg-gray-900">
                <!-- Timeline items injected here by JS -->
            </div>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- SCRIPTS (WAJIB URUTAN INI)                                -->
    <!-- ========================================================= -->
    
    <!-- 1. ADAPTER SCRIPT (Sesuai PRD: Memetakan Array ke Object Map) -->
    <script type="module">
        import { daftarSiswa } from './js/data-siswa.js';
        
        // Konversi Flat Array -> Object Map berdasarkan Kelompok
        window.dataSiswa = daftarSiswa.reduce((acc, siswa) => {
            if (!acc[siswa.kelompok]) acc[siswa.kelompok] = [];
            acc[siswa.kelompok].push(siswa);
            return acc;
        }, {});
        
        // List Kelompok untuk Sorting
        window.daftarKelompok = Object.keys(window.dataSiswa).sort();
        
        console.log("[Adapter] Data Siswa berhasil dipetakan ke window.dataSiswa");
    </script>

    <!-- 2. MAIN LOGIC SCRIPT -->
    <script type="module" src="./js/komdis.js"></script>

</body>
</html>
